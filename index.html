<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码管理器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // 插件函数：自动将顶层 const/let 转为 var，避免多个 script 共享全局作用域时重复声明报错
    var topLevelVarPlugin = function() {
      return {
        visitor: {
          VariableDeclaration(path) {
            if (path.node.kind === 'const' || path.node.kind === 'let') {
              if (path.scope.block.type === 'Program') {
                path.node.kind = 'var';
              }
            }
          }
        }
      };
    };
    // 注册使用 classic JSX runtime 的 preset，防止 Babel 自动生成 import 语句
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets.react, { runtime: 'classic' }]
      ],
      plugins: [topLevelVarPlugin]
    });
  </script>

  <!-- 关键修复：按正确顺序加载 -->
  <script src="api-client.js"></script>
  <script src="icons.js" type="text/babel" data-presets="react-classic"></script>
  <script src="utils.js" type="text/babel" data-presets="react-classic"></script>
  <script src="auth.js" type="text/babel" data-presets="react-classic"></script>
  <script src="modals.js" type="text/babel" data-presets="react-classic"></script>
  <script src="actions.js" type="text/babel" data-presets="react-classic"></script>
  <script src="ui.js" type="text/babel" data-presets="react-classic"></script>
  <script src="app.js" type="text/babel" data-presets="react-classic"></script>
</body>
</html>
